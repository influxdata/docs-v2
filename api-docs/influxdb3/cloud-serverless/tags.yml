    description: >
      Create and manage database retention policy (DBRP) mappings
      for InfluxDB Cloud Serverless. DBRP mappings associate v1-compatible
      database and retention policy combinations with Cloud Serverless buckets,
      enabling queries and writes using InfluxDB v1 API endpoints.
    x-related:
