  Common parameters:
    x-traitTag: true
    description: |
      Most InfluxDB API endpoints require parameters in the request — for example,
      specifying the database to write to or query from.

      ### Common parameters

      The following table shows common parameters used by many InfluxDB 3 Cloud Dedicated
      API endpoints.
      Some endpoints require additional parameters in the query string or request body.

      | Query parameter | Value type | Description                                       |
      |:--------------- |:---------- |:--------------------------------------------------|
      | `db`            | string     | The database name (v1 and v3 endpoints)           |
      | `bucket`        | string     | The database name (v2 `/api/v2/write` endpoint)   |
      | `org`           | string     | Ignored; included for v2 client compatibility     |
      | `precision`     | string     | Timestamp precision for writes (`ns`, `us`, `ms`, `s`) |
      | `epoch`         | string     | Timestamp precision for query responses (`ns`, `u`, `ms`, `s`, `m`, `h`) |
  Headers:
    x-traitTag: true
    description: |
      InfluxDB HTTP API endpoints use standard HTTP request and response headers.
      The following table shows common headers used by many InfluxDB 3 Cloud Dedicated
      API endpoints.
      Some endpoints use additional headers specific to their function — for example,
      write endpoints accept `Content-Encoding` to indicate that line protocol
      is compressed in the request body.

      | Header           | Value type | Description                                        |
      |:---------------- |:---------- |:---------------------------------------------------|
      | `Accept`         | string     | The content type that the client can understand.   |
      | `Authorization`  | string     | The authorization scheme and credential.           |
      | `Content-Length` | integer    | The size of the entity-body, in bytes.             |
      | `Content-Type`   | string     | The format of the data in the request body.        |
  Ping:
    description: |
      Check the availability of the InfluxDB 3 Cloud Dedicated instance.
  Query data:
