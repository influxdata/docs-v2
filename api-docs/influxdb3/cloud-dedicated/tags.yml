  Quick start:
    x-traitTag: true
    description: |
      Authenticate, write, and query with the InfluxDB 3 Cloud Dedicated API.

      **Prerequisites**: A database token with write permission for the target database.
      Use the Management API or `influxctl` to create tokens before writing data.

      1. Check that the instance is available.

         ```bash
         curl "https://cluster-id.a.influxdb.io/ping"
         ```

         A `204 No Content` response indicates the querier is available.

      2. Write data to InfluxDB.

         ```bash
         curl "https://cluster-id.a.influxdb.io/api/v2/write?bucket=sensors&precision=ns" \
           --header "Authorization: Bearer DATABASE_TOKEN" \
           --header "Content-Type: text/plain; charset=utf-8" \
           --data-raw "home,room=Kitchen temp=72.0
         home,room=Living\ room temp=71.5"
         ```

         If all data is written, the response is `204 No Content`.

      3. Query data from InfluxDB using InfluxQL.

         ```bash
         curl "https://cluster-id.a.influxdb.io/query" \
           --get \
           --header "Authorization: Bearer DATABASE_TOKEN" \
           --data-urlencode "db=sensors" \
           --data-urlencode "q=SELECT * FROM home WHERE room='Living room'" \
           --data-urlencode "epoch=ns"
         ```

      For SQL queries and Arrow-format output, use the Flight+gRPC protocol.
      For more information, see the [get started](/influxdb3/cloud-dedicated/get-started/) guide.
  Response codes:
    x-traitTag: true
    description: |
      InfluxDB 3 Cloud Dedicated API endpoints return standard HTTP status codes.

      | Status code              | Description                                                                                 |
      |:------------------------ |:------------------------------------------------------------------------------------------- |
      | `200 OK`                 | Request succeeded. Response body contains the requested data.                               |
      | `204 No Content`         | Request succeeded. No response body (common for successful writes).                         |
      | `400 Bad Request`        | Malformed request — check syntax, query, or line protocol for errors.                       |
      | `401 Unauthorized`       | Missing or invalid token. Verify the `Authorization` header and token permissions.          |
      | `403 Forbidden`          | Valid token but insufficient permissions for the requested operation.                       |
      | `404 Not Found`          | The requested resource does not exist — check the database name and endpoint path.          |
      | `422 Unprocessable Entity`| The request body is syntactically valid but semantically incorrect.                        |
      | `429 Too Many Requests`  | Request rate exceeds cluster limits. Retry with exponential backoff.                        |
      | `500 Internal Server Error`| Server error. If the error persists, contact InfluxData support.                          |
  System information endpoints:
    x-traitTag: true
    description: |
      InfluxDB 3 Cloud Dedicated provides system endpoints for checking instance
      availability and retrieving version information.

      | Endpoint       | Method        | Description                                        |
      |:-------------- |:------------- |:---------------------------------------------------|
      | `/ping`        | `GET`, `HEAD` | Returns `204` if the querier is available. Response headers include `X-Influxdb-Version` and `X-Influxdb-Build`. Does not require authentication. Checks querier health only; does not check ingesters. |

      To verify ingester availability before writing data, send a request to one
      of the [write endpoints](#operation/PostWrite).
  Usage:
    x-traitTag: true
    description: |
      InfluxDB 3 Cloud Dedicated tracks storage usage for your cluster.
      The Usage endpoints let you retrieve stored data size metrics
      to monitor capacity consumption.

      Usage data is available at the cluster and database level.
      Queries return storage size in bytes for the data stored in your cluster
      at the time of the request.
  Write data:
    description: |
      Write time series data to InfluxDB 3 Cloud Dedicated databases using the v2-compatible `/api/v2/write` endpoint or the v1-compatible `/write` endpoint with line protocol.
    externalDocs:
      description: Write data
      url: /influxdb3/cloud-dedicated/write-data/
    x-related:
      - title: Write data
        href: /influxdb3/cloud-dedicated/write-data/
