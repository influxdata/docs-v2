  Quick start:
    x-traitTag: true
    description: |
      Authenticate, write, and query with the InfluxDB Cloud API:

      1. Create an API token with write and read permissions for a bucket.
         Create tokens in the InfluxDB Cloud UI or via the
         Authorizations (API tokens) endpoints.

      2. Check the status of your InfluxDB Cloud region.

         ```bash
         curl "https://REGION.aws.cloud2.influxdata.com/health"
         ```

      3. Write data to a bucket using the `/api/v2/write` endpoint and
         [line protocol](/influxdb/cloud/reference/syntax/line-protocol/).

         ```bash
         curl --request POST \
           "https://REGION.aws.cloud2.influxdata.com/api/v2/write?org=ORG&bucket=BUCKET&precision=s" \
           --header "Authorization: Token YOUR_API_TOKEN" \
           --header "Content-Type: text/plain; charset=utf-8" \
           --data-raw "home,room=Kitchen temp=72.0 1640995200
         home,room=Living\ Room temp=71.5 1640995200"
         ```

         If all data is written, the response is `204 No Content`.

      4. Query data using the Flux `/api/v2/query` endpoint.

         ```bash
         curl --request POST \
           "https://REGION.aws.cloud2.influxdata.com/api/v2/query?org=ORG" \
           --header "Authorization: Token YOUR_API_TOKEN" \
           --header "Content-Type: application/vnd.flux" \
           --data 'from(bucket: "BUCKET") |> range(start: -1h) |> filter(fn: (r) => r._measurement == "home")'
         ```

         Alternatively, query with InfluxQL using the v1-compatible `/query`
         endpoint. Target a v1 DBRP mapping (`database.retention_policy`) that
         points to your bucket:

         ```bash
         curl --get "https://REGION.aws.cloud2.influxdata.com/query" \
           --header "Authorization: Token YOUR_API_TOKEN" \
           --data-urlencode "db=DATABASE" \
           --data-urlencode "q=SELECT * FROM home WHERE time > now() - 1h"
         ```

      For more information, see [Get started with InfluxDB Cloud](/influxdb/cloud/get-started/).
    x-related:
      - title: Get started with InfluxDB Cloud
        href: /influxdb/cloud/get-started/
      - title: Write data
        href: /influxdb/cloud/write-data/
      - title: Query data with Flux
        href: /influxdb/cloud/query-data/
  Resources:
    description: |
      Retrieve a list of top-level resource types available in the InfluxDB Cloud API.
  Response codes:
    x-traitTag: true
    description: |
      InfluxDB Cloud API endpoints return standard HTTP status codes. The
      following table summarizes the most common response codes.

      | Status code | Meaning                                                                 |
      |:------------|:------------------------------------------------------------------------|
      | `200 OK`    | Success.                                                                |
      | `201 Created` | The resource was created.                                             |
      | `204 No Content` | Success with no response body (typically after write or delete).  |
      | `400 Bad Request` | Request parameters or body are malformed or invalid.              |
      | `401 Unauthorized` | Missing or invalid credentials.                                  |
      | `403 Forbidden` | Credentials lack permission for the requested resource.             |
      | `404 Not Found` | The requested resource does not exist.                              |
      | `413 Payload Too Large` | Request body exceeds the maximum allowed size.              |
      | `422 Unprocessable Entity` | Request body is well-formed but semantically invalid.    |
      | `429 Too Many Requests` | Rate limit exceeded.                                        |
      | `500 Internal Server Error` | Unexpected server error.                                |
      | `503 Service Unavailable` | Server is overloaded or under maintenance.                |
