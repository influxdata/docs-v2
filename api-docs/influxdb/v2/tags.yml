  Pagination:
    x-traitTag: true
    description: |
      List endpoints in the InfluxDB OSS v2 API support pagination via query
      parameters. Use these parameters to page through large result sets.

      | Query parameter | Value type | Description                                         |
      |:----------------|:-----------|:----------------------------------------------------|
      | `limit`         | integer    | Maximum number of records to return (default: 20). |
      | `offset`        | integer    | Number of records to skip before returning results. |
      | `after`         | string     | Return records created after the specified record ID. |
      | `descending`    | boolean    | Sort results in descending order.                   |

      List responses include pagination metadata (such as total count or links
      to the next page) to help navigate through result pages.
