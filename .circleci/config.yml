version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:24.5.0
        environment:
          S3DEPLOY_VERSION: "2.11.0"
          # From https://github.com/bep/s3deploy/releases
          S3DEPLOY_VERSION_HASH: "d3566a6a56735ea5710cf22c35f8f411164e6efc22ded98743a1d7a5a21c740e"

    steps:
      - checkout
      - restore_cache:
          keys:
            - install-{{ .Environment.CACHE_VERSION }}-{{ checksum ".circleci/config.yml" }}
            - install-{{ .Environment.CACHE_VERSION }}-
      - run:
          name: Make bin folder
          command: mkdir -p $HOME/bin
      - run:
          name: Install s3deploy
          command: ./deploy/ci-install-s3deploy.sh
      - run:
          name: Install NodeJS dependencies
          command: yarn install
      - run:
          name: Install API documentation dependencies
          command: cd api-docs && yarn install
      - run:
          name: Build API documentation scripts
          command: yarn build:api-docs:scripts
      - run:
          name: Generate API documentation
          command: cd api-docs && bash generate-api-docs.sh
      - run:
          name: Inject Flux stdlib frontmatter
          command: node ./flux-build-scripts/inject-flux-stdlib-frontmatter.cjs
      - run:
          name: Update Flux/InfluxDB versions
          command: node ./flux-build-scripts/update-flux-versions.cjs
      - save_cache:
          key: install-{{ .Environment.CACHE_VERSION }}-{{ checksum ".circleci/config.yml" }}
          paths:
            - /home/circleci/bin
      - run:
          name: Hugo Build
          command: yarn hugo --environment production --logLevel info --gc --destination workspace/public
      - run:
          name: Generate LLM-friendly Markdown
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              # Full build for production deployments
              yarn build:md --public-dir workspace/public
            else
              # Incremental build for PRs - only process changed files
              yarn build:md --public-dir workspace/public --only-changed --base-branch origin/master
            fi
      - run:
          name: Generate per-product llms-full.txt corpora
          # Per-product corpora aggregate every page's .md, so a partial set
          # from --only-changed would produce incomplete corpora. Run on
          # master only — matches the deploy filter below.
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              yarn build:llms-full --public-dir workspace/public
            else
              echo "Skipping llms-full build (master-only)"
            fi
      - run:
          name: Verify Markdown alternate link coherence
          # Catches drift between the head-link partial (which advertises
          # the .md twin) and build-llm-markdown.js (which generates it).
          # Master-only so PR incremental builds don't false-positive on
          # the partial .md set.
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              yarn check:md-coherence --public-dir workspace/public
            else
              echo "Skipping coherence check (master-only)"
            fi
      - persist_to_workspace:
          root: workspace
          paths:
            - public

  deploy:
    docker:
      - image: cimg/go:1.22.2
    steps:
      - checkout
      - restore_cache:
          keys:
            - install-{{ .Environment.CACHE_VERSION }}-{{ checksum ".circleci/config.yml" }}
            - install-{{ .Environment.CACHE_VERSION }}-
      - attach_workspace:
          at: workspace
      - run:
          name: Deploy to S3
          command: $HOME/bin/s3deploy -source=workspace/public/ -bucket=$BUCKET -region=$REGION -distribution-id=$CF_DISTRIBUTION_ID
      - run:
          name: Post in Slack
          command: >
            export COMMIT_INFO="$(git log -1 --format='%n>>>%s%n%b%n_<https://github.com/influxdata/docs-v2/commit/%H|Commit %h> - by %an_')"; curl -X POST --data-urlencode "payload={\"username\": \"Doc the Docs Bot\", \"text\": \"The docs successfully deployed! :greeny_peeny:\n\n $COMMIT_INFO\", \"icon_emoji\": \":doc_green:\"}" $SLACK_DOCS_WEBHOOK_URL
          when: on_success

workflows:
  build:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only:
                - master
