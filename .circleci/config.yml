version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:22.16.0

    steps:
      - checkout
      - run:
          name: Verify Node major matches .nvmrc
          command: |
            expected=$(tr -d 'v' < .nvmrc | cut -d'.' -f1)
            actual=$(node --version | tr -d 'v' | cut -d'.' -f1)
            if [ "$expected" != "$actual" ]; then
              echo "ERROR: running Node major $actual != .nvmrc major $expected."
              echo "Update the cimg/node image tag in .circleci/config.yml to match .nvmrc."
              exit 1
            fi
            echo "Node major $actual matches .nvmrc."
      - restore_cache:
          keys:
            - yarn-v1-{{ checksum "yarn.lock" }}-{{ checksum "api-docs/yarn.lock" }}-{{ checksum "scripts/rust-markdown-converter/yarn.lock" }}
            - yarn-v1-{{ checksum "yarn.lock" }}-{{ checksum "api-docs/yarn.lock" }}-
            - yarn-v1-{{ checksum "yarn.lock" }}-
            - yarn-v1-
      - run:
          name: Install NodeJS dependencies
          command: CYPRESS_INSTALL_BINARY=0 yarn install --frozen-lockfile --non-interactive --prefer-offline
      - run:
          name: Install API documentation dependencies
          command: cd api-docs && yarn install --frozen-lockfile --non-interactive --prefer-offline
      - run:
          name: Build API documentation scripts
          command: yarn build:api-docs:scripts
      - run:
          name: Generate API documentation
          command: cd api-docs && bash generate-api-docs.sh
      - run:
          name: Inject Flux stdlib frontmatter
          command: node ./flux-build-scripts/inject-flux-stdlib-frontmatter.cjs
      - run:
          name: Update Flux/InfluxDB versions
          command: node ./flux-build-scripts/update-flux-versions.cjs
      - restore_cache:
          keys:
            - rust-{{ arch }}-{{ checksum "scripts/rust-markdown-converter/rust-toolchain.toml" }}-{{ checksum "scripts/rust-markdown-converter/Cargo.lock" }}
            - rust-{{ arch }}-{{ checksum "scripts/rust-markdown-converter/rust-toolchain.toml" }}-
            - rust-{{ arch }}-
      - run:
          name: Install Rust toolchain
          command: |
            # Install rustup if not already cached in ~/.cargo/~/.rustup.
            if [ ! -x "$HOME/.cargo/bin/rustup" ]; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain none
            fi
            echo 'source "$HOME/.cargo/env"' >> "$BASH_ENV"
            source "$HOME/.cargo/env"
            # Install the exact toolchain pinned in rust-toolchain.toml and set it
            # as the global default. This makes `cargo` available from any directory,
            # including the repo root where build-rust-converter.js probes it before
            # changing into scripts/rust-markdown-converter/.
            RUST_CHANNEL=$(grep '^channel' scripts/rust-markdown-converter/rust-toolchain.toml \
              | sed 's/.*= *"\([^"]*\)".*/\1/')
            rustup toolchain install --profile minimal --no-self-update "$RUST_CHANNEL"
            rustup default "$RUST_CHANNEL"
      - run:
          name: Build Rust markdown converter
          command: |
            source "$HOME/.cargo/env"
            node scripts/build-rust-converter.js
      - save_cache:
          key: yarn-v1-{{ checksum "yarn.lock" }}-{{ checksum "api-docs/yarn.lock" }}-{{ checksum "scripts/rust-markdown-converter/yarn.lock" }}
          paths:
            - ~/.cache/yarn
      - save_cache:
          key: rust-{{ arch }}-{{ checksum "scripts/rust-markdown-converter/rust-toolchain.toml" }}-{{ checksum "scripts/rust-markdown-converter/Cargo.lock" }}
          paths:
            - ~/.cargo
            - ~/.rustup
            - scripts/rust-markdown-converter/target
      - run:
          name: Hugo Build
          command: |
            set -o pipefail
            yarn hugo config --environment production > /tmp/hugo-config.toml

            echo "Raw outputFormats config:"
            grep -n -A25 -B2 "outputFormats:" config/_default/hugo.yml || true

            echo "Merged custom output formats:"
            grep -i -A10 -B2 "llmstxt\|sitemapmd" /tmp/hugo-config.toml || true

            echo "Hugo output config:"
            grep -A8 -E '^\[outputformats\.(llmstxt|sitemapmd)\]|^\[outputs\]' /tmp/hugo-config.toml || true

            echo "Hugo custom output templates:"
            ls -l layouts/index.llmstxt.txt layouts/index.sitemapmd.xml || true

            yarn hugo --environment production --logLevel info --gc --destination workspace/public 2>&1 | tee /tmp/hugo-build.log

            echo "Hugo root outputs:"
            find workspace/public -maxdepth 1 -type f -print | sort

            if ! grep -q "outputFormat sitemapmd" /tmp/hugo-build.log; then
              echo "WARNING: Hugo log did not include sitemapmd render phase."
            fi

            if ! grep -q "step postProcess" /tmp/hugo-build.log; then
              echo "WARNING: Hugo log did not include postProcess phase."
            fi
      - run:
          name: Verify deployable Hugo output
          # Deploy safety should be based on HTML output, not optional
          # LLM discovery artifacts. A complete deployable build emits a
          # healthy HTML sitemap and thousands of index.html pages.
          command: |
            PUBLIC_DIR=workspace/public
            MIN_PAGES=5000
            MIN_SITEMAP_BYTES=100000
            FAIL=0

            echo "Root public files:"
            find "$PUBLIC_DIR" -maxdepth 1 -type f -print | sort

            PAGES=$(find "$PUBLIC_DIR" -name index.html | wc -l | tr -d ' ')
            echo "Rendered index.html pages: $PAGES (floor: $MIN_PAGES)"
            if [ "$PAGES" -lt "$MIN_PAGES" ]; then
              echo "ERROR: page count $PAGES below floor $MIN_PAGES — build incomplete."
              FAIL=1
            fi

            HTML_SITEMAP="$PUBLIC_DIR/sitemap.xml"
            HTML_SITEMAP_BYTES=0
            if [ -f "$HTML_SITEMAP" ]; then
              HTML_SITEMAP_BYTES=$(wc -c < "$HTML_SITEMAP" | tr -d ' ')
            fi
            echo "HTML sitemap bytes: $HTML_SITEMAP_BYTES (floor: $MIN_SITEMAP_BYTES)"
            if [ "$HTML_SITEMAP_BYTES" -lt "$MIN_SITEMAP_BYTES" ]; then
              echo "ERROR: $HTML_SITEMAP missing or too small — build incomplete."
              FAIL=1
            fi

            MD_SITEMAP="$PUBLIC_DIR/sitemap-md.xml"
            if [ -f "$MD_SITEMAP" ]; then
              MD_SITEMAP_BYTES=$(wc -c < "$MD_SITEMAP" | tr -d ' ')
              echo "Markdown sitemap bytes: $MD_SITEMAP_BYTES"
            else
              echo "WARNING: $MD_SITEMAP missing."
              echo "The post-Hugo AI artifact step will regenerate it from HTML alternate links."
            fi

            if [ "$FAIL" -ne 0 ]; then
              echo "Refusing to continue: a partial deploy would delete live pages."
              echo "Re-run the build (clear the CircleCI cache). If it recurs,"
              echo "investigate the Hugo Build step (OOM/errors) before deploying."
              exit 1
            fi
            echo "Deployable Hugo output OK."
      - run:
          name: Generate AI discovery artifacts
          command: yarn build:ai-artifacts --public-dir workspace/public
      - run:
          name: Generate LLM-friendly Markdown
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              # Full build for production deployments
              yarn build:md --public-dir workspace/public
            else
              # Incremental build for PRs - only process changed files
              yarn build:md --public-dir workspace/public --only-changed --base-branch origin/master
            fi
      - run:
          name: Generate per-product llms-full.txt corpora
          # Per-product corpora aggregate every page's .md, so a partial set
          # from --only-changed would produce incomplete corpora. Run on
          # master only — matches the deploy filter below.
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              yarn build:llms-full --public-dir workspace/public
            else
              echo "Skipping llms-full build (master-only)"
            fi
      - run:
          name: Verify Markdown alternate link coherence
          # Catches drift between the head-link partial (which advertises
          # the .md twin) and build-llm-markdown.js (which generates it).
          # Master-only so PR incremental builds don't false-positive on
          # the partial .md set.
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              yarn check:md-coherence --public-dir workspace/public
            else
              echo "Skipping coherence check (master-only)"
            fi
      - run:
          name: Archive build output (master only)
          command: |
            mkdir -p workspace/archive
            if [ "$CIRCLE_BRANCH" != "master" ]; then
              echo "Non-master build — skipping archive."
              exit 0
            fi
            tar -czf workspace/archive/public.tar.gz -C workspace public
            (
              cd workspace/archive
              sha256sum public.tar.gz > public.SHA256SUMS
            )
            HUGO_VERSION=$(yarn --silent hugo version 2>/dev/null | head -1)
            RUST_CHANNEL=$(grep '^channel' scripts/rust-markdown-converter/rust-toolchain.toml \
              | sed 's/.*= *"\([^"]*\)".*/\1/')
            cat > workspace/archive/build-manifest.json \<<EOF
            {
              "commit": "$CIRCLE_SHA1",
              "branch": "$CIRCLE_BRANCH",
              "build_num": $CIRCLE_BUILD_NUM,
              "node_version": "$(node --version)",
              "hugo_version": "$HUGO_VERSION",
              "rust_channel": "$RUST_CHANNEL",
              "yarn_lock_sha256": "$(sha256sum yarn.lock | cut -d' ' -f1)",
              "api_docs_yarn_lock_sha256": "$(sha256sum api-docs/yarn.lock | cut -d' ' -f1)",
              "cargo_lock_sha256": "$(sha256sum scripts/rust-markdown-converter/Cargo.lock | cut -d' ' -f1)"
            }
            EOF
            echo "Archive: $(du -sh workspace/archive/public.tar.gz | cut -f1)"
      - persist_to_workspace:
          root: workspace
          paths:
            - archive

  deploy:
    docker:
      - image: cimg/go:1.22.2
        environment:
          S3DEPLOY_VERSION: "2.11.0"
          # From https://github.com/bep/s3deploy/releases
          S3DEPLOY_VERSION_HASH: "d3566a6a56735ea5710cf22c35f8f411164e6efc22ded98743a1d7a5a21c740e"
    steps:
      - checkout
      - restore_cache:
          keys:
            - s3deploy-{{ arch }}-{{ checksum ".circleci/config.yml" }}
      - run:
          name: Make bin folder
          command: mkdir -p $HOME/bin
      - run:
          name: Install s3deploy
          command: ./deploy/ci-install-s3deploy.sh
      - save_cache:
          key: s3deploy-{{ arch }}-{{ checksum ".circleci/config.yml" }}
          paths:
            - ~/bin
      - attach_workspace:
          at: workspace
      - run:
          name: Verify archive checksum
          command: |
            cd workspace/archive
            sha256sum -c public.SHA256SUMS
            echo "Build manifest:"
            cat build-manifest.json
      - run:
          name: Extract build archive
          command: tar -xzf workspace/archive/public.tar.gz -C workspace/
      - run:
          name: Deploy to S3
          command: $HOME/bin/s3deploy -source=workspace/public/ -bucket=$BUCKET -region=$REGION -distribution-id=$CF_DISTRIBUTION_ID
      - run:
          name: Post success in Slack
          command: >
            export COMMIT_INFO="$(git log -1 --format='%n>>>%s%n%b%n_<https://github.com/influxdata/docs-v2/commit/%H|Commit %h> - by %an_')"; curl -X POST --data-urlencode "payload={\"username\": \"Doc the Docs Bot\", \"text\": \"The docs successfully deployed! :greeny_peeny:\n\n $COMMIT_INFO\", \"icon_emoji\": \":doc_green:\"}" $SLACK_DOCS_WEBHOOK_URL
          when: on_success
      - run:
          name: Post failure in Slack
          command: >
            export COMMIT_INFO="$(git log -1 --format='%n>>>%s%n_<https://github.com/influxdata/docs-v2/commit/%H|Commit %h> - by %an_')"; curl -X POST --data-urlencode "payload={\"username\": \"Doc the Docs Bot\", \"text\": \":red_circle: Docs deploy FAILED! :greeny_peeny:\n\n $COMMIT_INFO\", \"icon_emoji\": \":doc_green:\"}" $SLACK_DOCS_WEBHOOK_URL
          when: on_fail

workflows:
  build:
    jobs:
      - build
      - deploy:
          requires:
            - build
          filters:
            branches:
              only:
                - master
