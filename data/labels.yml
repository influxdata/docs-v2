# Label definitions for the docs-v2 repository.
#
# Source of truth for non-product label names, colors, and descriptions.
# Product labels are derived from data/products.yml (label_group + content_path),
# except product:shared which is defined here (applies across products).
# Review label behavior (severity, result rules) is in .github/templates/review-comment.md.
#
# When a label value is a string, it's the description and the group color applies.
# When a label value is an object, it has its own color.

product:
  description: Cross-product labels not derived from a single products.yml entry.
  labels:
    product:shared:
      color: "#FFA500"
      description: Shared content that applies to multiple products

source:
  color: "#9370DB"
  description: Track how an issue or PR was created.
  labels:
    source:auto-detected: Created by change detection within this repo
    source:dar: Generated by the DAR pipeline
    source:sync: Synced from an external repository
    source:feedback: From user feedback
    source:manual: Human-created issue

waiting:
  color: "#FF8C00"
  description: Indicate external blockers.
  labels:
    waiting:engineering: Waiting for engineer confirmation
    waiting:pr: Blocked on another PR merging first
    waiting:product: Waiting for product or PM decision

workflow:
  description: Control automation behavior.
  labels:
    agent-ready:
      color: "#00FF00"
      description: Issue can be worked autonomously by an agent
    skip-review:
      color: "#1E90FF"
      description: PR skips the automated doc review pipeline

area:
  color: "#a89129"
  description: What part of the repo a change affects.
  labels:
    area:agents: "AI agents, skills, hooks, and MCP config"
    area:ci: "Continuous integration pipeline (verify, test, validate, publish)"
    area:links: "Link management (validation, checking, fixing)"
    area:site-ui: "Documentation site UI: templates, styles, JS/TS"

release:
  description: Release-gated merge workflow.
  labels:
    release:pending:
      color: "#FEF2C0"
      description: Waiting for product release before merging
    release:ready:
      color: "#0E8A16"
      description: Product released, docs ready for review/merge

onboarding:
  description: Contributor onboarding.
  labels:
    good-first-issue:
      color: "#f9f348"
      description: Easy update. Good for first timers!

review:
  description: >-
    Automated review outcomes. Mutually exclusive.
    See .github/templates/review-comment.md for severity definitions
    and result-to-label mapping.
  labels:
    review:approved:
      color: "#28A745"
      description: Automated review passed
    review:changes-requested:
      color: "#DC3545"
      description: Automated review found blocking issues
    review:needs-human:
      color: "#FFC107"
      description: Automated review inconclusive
