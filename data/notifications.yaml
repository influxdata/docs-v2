- id: influxdb-v2-9-token-hashing-default
  level: note
  scope:
    - /influxdb/v2/
  title: 'InfluxDB OSS 2.9.0: API tokens are hashed by default'
  slug: |
    Stronger token security in **InfluxDB OSS 2.9.0** — tokens are
    hashed on disk by default. Existing tokens are hashed on first
    startup and can't be recovered afterward. **Capture any plaintext
    tokens you still need before you upgrade.**

    [View InfluxDB OSS 2.9.0 release notes](/influxdb/v2/reference/release-notes/influxdb/#v290)
  message: |
    Hashed tokens authenticate exactly like unhashed tokens — clients
    and integrations keep working.

    **Also new in 2.9.0:**

    - Configurable backup compression
    - Restore support for backups containing hashed tokens
    - Tighter Edge Data Replication queue validation
    - Flux upgrade
    - Compaction reliability improvements

- id: explorer-1-9-key-enhancements
  level: note
  scope:
    - /
    - /influxdb3/explorer/
    - /influxdb3/core/
    - /influxdb3/enterprise/
  title: Key enhancements in Explorer 1.9
  slug: |
    Explorer 1.9 is now available with InfluxQL support, an AI-assisted
    Flux to SQL converter (beta), and new live sample data simulators.

    <a class="btn" href="/influxdb3/explorer/release-notes/#v190">View Explorer 1.9 release notes</a>
  message: |
    Explorer 1.9 includes new features and improvements that make it easier to
    query, visualize, and manage data.

    **Highlights:**

    - **Flux to SQL converter (beta)**: Convert Flux queries to SQL with an AI-assisted converter.
    - **InfluxQL support**: Query data with InfluxQL in the Data Explorer and dashboards, and save and load InfluxQL queries.
    - **InfluxQL visualizations**: Render line and bar charts from InfluxQL results with per-tag series grouping.
    - **Query error history**: Review a history of query errors in the query tool.
    - **Live sample data simulators**: Generate continuous live sample data with new bird data and signal generator simulators.

    For more details, see [Explorer 1.9 release notes](/influxdb3/explorer/release-notes/#v190)

- id: influxdb3-10-core-release
  level: note
  scope:
    - /influxdb3/core/
  title: 'InfluxDB 3.10 is now available'
  slug: |
    InfluxDB 3 Core 3.10 adds an automatic catalog format upgrade, a
    configurable query-concurrency limit, and processing engine improvements.
  message: |
    **Key updates in InfluxDB 3 Core 3.10:**

    - **Catalog format upgrade**: the on-disk catalog automatically upgrades from format v2 to v3 on first 3.10 startup. Migration is one-way—back up your catalog before upgrading.
    - **`--max-concurrent-queries`**: limit concurrent queries (adjustable at runtime).
    - **`GET /ready` endpoint** for readiness probes.
    - **Processing engine**: cross-database queries and trigger lockdown flags.

    For more information, see the
    [InfluxDB 3 Core release notes](/influxdb3/core/release-notes/).

- id: influxdb3-10-enterprise-release
  level: note
  scope:
    - /influxdb3/
    - /influxdb3/enterprise/
  exclude:
    - /influxdb3/core/
    - /influxdb3/explorer/
    - /influxdb3/cloud-dedicated/
    - /influxdb3/cloud-serverless/
    - /influxdb3/clustered/
  title: 'InfluxDB 3.10 is now available'
  slug: |
    InfluxDB 3 Enterprise 3.10 adds automated backup and restore, row-level
    deletions, and user management, with an automatic catalog format upgrade
    and performance preview improvements.
  message: |
    **Key updates in InfluxDB 3 Enterprise 3.10:**

    - **Catalog format upgrade**: the on-disk catalog automatically upgrades from format v2 to v3 on first 3.10 startup. Migration is one-way—back up your catalog before upgrading.
    - **Automated backup and restore** (beta)
    - **Row-level deletions**
    - **User management** (authentication and RBAC) — preview
    - **Performance preview improvements**

    Backup and restore, row-level deletions, and the performance preview require
    the Enterprise storage engine upgrade (opt-in beta). _Beta and preview
    features are subject to breaking changes and aren't recommended for
    production use._

    For more information, see the
    [InfluxDB 3 Enterprise release notes](/influxdb3/enterprise/release-notes/)

- id: telegraf-enterprise-beta
  level: note
  scope:
    - /
  exclude:
    - /platform/
    - /resources/
    - /kapacitor/
    - /chronograf/
    - /enterprise_influxdb/
    - /influxdb3/
    - /influxdb/
    - /flux/
  title: Telegraf Enterprise now in public beta
  slug: |   
    Get early access to the **Telegraf Controller** and provide feedback to help
    shape the future of **Telegraf Enterprise**.

    <a class="btn" href="https://www.influxdata.com/blog/telegraf-enterprise-beta">See the Blog Post</a>
  message: |
    The upcoming Telegraf Enterprise offering is for organizations running
    Telegraf at scale and is comprised of two key components:

    - **Telegraf Controller**: A control plane (UI + API) that centralizes Telegraf configuration management and agent health visibility.
    - **Telegraf Enterprise Support**: Official support for Telegraf Controller and Telegraf plugins.

    <a href="https://influxdata.com/products/telegraf-enterprise" target="_blank">Join the Telegraf Enterprise beta</a>
    to get early access to the Telegraf Controller and provide feedback to help
    shape the future of Telegraf Enterprise.

    For more information:

    - [See the announcement blog post](https://www.influxdata.com/blog/telegraf-enterprise-beta)
    - [Telegraf Controller Documentation](/telegraf/controller/)
    - [Download and install Telegraf Controller](/telegraf/controller/install/)

