name: Cleanup Stale Previews

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for AWS OIDC
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PR_PREVIEW_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get open PR numbers
        id: open-prs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const prNumbers = prs.map((pr) => pr.number);
            core.setOutput('numbers', JSON.stringify(prNumbers));
            console.log(`Open PRs: ${prNumbers.join(', ')}`);

      - name: Remove stale preview prefixes
        env:
          OPEN_PRS: ${{ steps.open-prs.outputs.numbers }}
          STAGING_BUCKET: ${{ secrets.STAGING_BUCKET }}
        run: |
          PREFIXES=$(aws s3api list-objects-v2 \
            --bucket "$STAGING_BUCKET" \
            --prefix 'pr-preview/' \
            --delimiter '/' \
            --query 'CommonPrefixes[].Prefix' \
            --output text)

          REMOVED=0
          INVALIDATION_PATHS=()

          for prefix in $PREFIXES; do
            PR_NUM=$(echo "$prefix" | grep -oP 'pr-preview/pr-\K\d+')

            # Validate PR_NUM is numeric to prevent injection
            if ! [[ "$PR_NUM" =~ ^[0-9]+$ ]]; then
              echo "Skipping unrecognized prefix: $prefix"
              continue
            fi

            if ! jq -e --argjson n "$PR_NUM" 'index($n) != null' <<< "$OPEN_PRS" > /dev/null; then
              echo "Removing stale preview: $prefix (PR #$PR_NUM is closed)"
              aws s3 rm "s3://${STAGING_BUCKET}/${prefix}" --recursive
              INVALIDATION_PATHS+=("/${prefix}*")
              REMOVED=$((REMOVED + 1))
            else
              echo "Keeping preview: $prefix (PR #$PR_NUM is open)"
            fi
          done

          if [ "$REMOVED" -gt 0 ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${{ secrets.STAGING_CF_DISTRIBUTION_ID }}" \
              --paths "${INVALIDATION_PATHS[@]}"
            echo "Cleaned up $REMOVED stale preview(s)"
          else
            echo "No stale previews to clean up"
          fi

          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
        id: remove

      - name: Report cleanup summary
        if: always()
        run: |
          echo "## Stale Preview Cleanup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Removed: ${{ steps.remove.outputs.removed || '0' }}" >> "$GITHUB_STEP_SUMMARY"
