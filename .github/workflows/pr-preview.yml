name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'assets/**'
      - 'data/**'
      - 'api-docs/**'
      - 'openapi/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # Skip draft PRs and check for re-runs that would overwrite successful status
  check-draft:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      pull-requests: read
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const runAttempt = Number(process.env.GITHUB_RUN_ATTEMPT) || 1;

            // Check for draft PR
            if (pr?.draft) {
              core.info('Skipping draft PR');
              core.setOutput('should-run', 'false');
              return;
            }

            // First attempts always proceed (after draft check)
            if (runAttempt === 1) {
              core.setOutput('should-run', 'true');
              return;
            }

            // This is a re-run. Check if jobs would actually run or skip.
            const isFork = pr?.head?.repo?.full_name !== pr?.base?.repo?.full_name;
            const isClosed = context.payload.action === 'closed';

            // For preview job: needs non-fork, non-closed
            // For cleanup job: needs closed
            // For fork-notice: needs fork, non-closed
            // At least one job would run in most cases unless PR state changed
            const previewWouldRun = !isFork && !isClosed;
            const cleanupWouldRun = isClosed;
            const forkNoticeWouldRun = isFork && !isClosed;
            const anyJobWouldRun = previewWouldRun || cleanupWouldRun || forkNoticeWouldRun;

            if (anyJobWouldRun) {
              core.info('Re-run would execute jobs - proceeding');
              core.setOutput('should-run', 'true');
              return;
            }

            // Jobs would skip. Check for existing successful runs.
            core.info('Re-run would skip jobs - checking for existing successful runs');

            try {
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                per_page: 100,
              });

              const previewJobs = ['check-draft', 'preview', 'cleanup', 'fork-notice'];
              const successfulOtherRuns = checkRuns.check_runs.filter(cr => {
                const isOurJob = previewJobs.includes(cr.name);
                const isSuccessful = cr.conclusion === 'success';
                const fromDifferentRun = cr.html_url && !cr.html_url.includes(`/runs/${context.runId}/`);
                return isOurJob && isSuccessful && fromDifferentRun;
              });

              if (successfulOtherRuns.length > 0) {
                core.info(`Found ${successfulOtherRuns.length} successful runs - aborting to preserve status`);
                core.setOutput('should-run', 'false');
                return;
              }
            } catch (error) {
              core.warning(`Could not check existing runs: ${error.message}`);
            }

            core.info('No existing successful runs - proceeding');
            core.setOutput('should-run', 'true');

  # Notify fork PRs that preview is not available
  fork-notice:
    needs: check-draft
    if: |
      needs.check-draft.outputs.should-run == 'true' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Post fork notice comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const marker = '<!-- pr-preview-fork-notice -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (!existing) {
              const timestamp = new Date().toISOString().replace('T', ' ').split('.')[0] + ' UTC';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `${marker}\n## 📦 PR Preview — Preview Bot\n\n| Status | Details |\n|--------|----------|\n| **Result** | ⏭️ NOT AVAILABLE |\n| **Reason** | Fork PR (security restriction) |\n| **Checked** | ${timestamp} |\n\n### Local Preview\n\nPR previews are not available for pull requests from forks due to GitHub Actions security restrictions.\n\nTo preview your changes locally, run:\n\`\`\`bash\nnpx hugo server\n\`\`\`\n\nOnce merged, your changes will be visible on the production site.`
              });
            }

  # Build and deploy preview
  preview:
    needs: check-draft
    # Skip fork PRs - GITHUB_TOKEN doesn't have write access to push to gh-pages
    if: |
      needs.check-draft.outputs.should-run == 'true' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Detect preview pages
        id: detect
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: origin/${{ github.base_ref }}
        run: node .github/scripts/detect-preview-pages.js

      - name: Post pending comment (needs input)
        if: steps.detect.outputs.needs-author-input == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPreviewComment } = await import('${{ github.workspace }}/.github/scripts/preview-comment.js');
            await upsertPreviewComment(github, context, {
              status: 'pending',
              needsInput: true,
              prNumber: context.issue.number
            });

      - name: Skip if no pages to deploy
        if: steps.detect.outputs.pages-to-deploy == '[]'
        run: |
          echo "No pages to deploy - skipping preview"
          echo "Reason: ${{ steps.detect.outputs.skip-reason || steps.detect.outputs.change-summary }}"

      - name: Build Hugo site
        if: steps.detect.outputs.pages-to-deploy != '[]'
        id: build
        env:
          # Set baseURL for GitHub Pages preview subdirectory
          PREVIEW_BASE_URL: https://influxdata.github.io/docs-v2/pr-preview/pr-${{ github.event.number }}/
        run: |
          START_TIME=$(date +%s)
          # Use pr-preview environment for path offset config
          npx hugo --minify --baseURL "$PREVIEW_BASE_URL" -e pr-preview
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "build-time=${DURATION}s" >> $GITHUB_OUTPUT

      - name: Prepare preview files
        if: steps.detect.outputs.pages-to-deploy != '[]'
        run: |
          node .github/scripts/prepare-preview-files.js \
            '${{ steps.detect.outputs.pages-to-deploy }}' \
            public \
            preview-staging

      - name: Deploy preview
        if: steps.detect.outputs.pages-to-deploy != '[]'
        id: deploy-preview
        continue-on-error: true
        uses: rossjrw/pr-preview-action@v1.4.8
        with:
          source-dir: ./preview-staging
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

      - name: Validate preview deployment
        if: steps.detect.outputs.pages-to-deploy != '[]'
        id: validate-deploy
        run: |
          DEPLOY_OUTCOME="${{ steps.deploy-preview.outcome }}"
          DEPLOY_URL="${{ steps.deploy-preview.outputs.deployment-url }}"

          if [ -z "$DEPLOY_URL" ]; then
            echo "Deployment step did not produce a preview URL. Failing preview job."
            exit 1
          fi

          if [ "$DEPLOY_OUTCOME" != "success" ]; then
            echo "Deployment reported outcome: $DEPLOY_OUTCOME"
            echo "Preview URL exists; treating as transient post-deploy comment error."
          fi

          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Post success comment
        if: steps.detect.outputs.pages-to-deploy != '[]' && steps.validate-deploy.outputs.status == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPreviewComment } = await import('${{ github.workspace }}/.github/scripts/preview-comment.js');
            const pages = JSON.parse('${{ steps.detect.outputs.pages-to-deploy }}');
            const previewUrl = `https://influxdata.github.io/docs-v2/pr-preview/pr-${{ github.event.number }}/`;
            await upsertPreviewComment(github, context, {
              status: 'success',
              previewUrl,
              pages,
              buildTime: '${{ steps.build.outputs.build-time }}',
              prNumber: context.issue.number
            });

      - name: Post skipped comment
        if: steps.detect.outputs.pages-to-deploy == '[]' && steps.detect.outputs.needs-author-input != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { upsertPreviewComment } = await import('${{ github.workspace }}/.github/scripts/preview-comment.js');
            await upsertPreviewComment(github, context, {
              status: 'skipped',
              skipReason: '${{ steps.detect.outputs.change-summary }}',
              prNumber: context.issue.number
            });

  # Cleanup on PR close
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="pr-preview/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Clean up preview for PR #${{ github.event.number }}" || echo "Nothing to commit"
            git push
            echo "Cleaned up $PREVIEW_DIR"
          else
            echo "No preview directory found for PR #${{ github.event.number }}"
          fi

      - name: Checkout scripts for comment deletion
        uses: actions/checkout@v4
        with:
          path: scripts-checkout

      - name: Delete preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const { deletePreviewComment } = await import('${{ github.workspace }}/scripts-checkout/.github/scripts/preview-comment.js');
            await deletePreviewComment(github, context);
