name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review, edited]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'assets/**'
      - 'data/**'
      - 'api-docs/**'
      - 'openapi/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # Skip draft PRs and check for re-runs that would overwrite successful status
  check-draft:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      pull-requests: read
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const runAttempt = Number(process.env.GITHUB_RUN_ATTEMPT) || 1;

            // Check for draft PR
            if (pr?.draft) {
              core.info('Skipping draft PR');
              core.setOutput('should-run', 'false');
              return;
            }

            // For 'edited' events, skip if only the title changed (body unchanged)
            if (context.payload.action === 'edited' && !context.payload.changes?.body) {
              core.info('PR title edited (body unchanged) - skipping');
              core.setOutput('should-run', 'false');
              return;
            }

            // First attempts always proceed (after draft check)
            if (runAttempt === 1) {
              core.setOutput('should-run', 'true');
              return;
            }

            // This is a re-run. Check if jobs would actually run or skip.
            const isFork = pr?.head?.repo?.full_name !== pr?.base?.repo?.full_name;
            const isClosed = context.payload.action === 'closed';

            // For preview job: needs non-fork, non-closed
            // For cleanup job: needs closed
            // For fork-notice: needs fork, non-closed
            // At least one job would run in most cases unless PR state changed
            const previewWouldRun = !isFork && !isClosed;
            const cleanupWouldRun = isClosed;
            const forkNoticeWouldRun = isFork && !isClosed;
            const anyJobWouldRun = previewWouldRun || cleanupWouldRun || forkNoticeWouldRun;

            if (anyJobWouldRun) {
              core.info('Re-run would execute jobs - proceeding');
              core.setOutput('should-run', 'true');
              return;
            }

            // Jobs would skip. Check for existing successful runs.
            core.info('Re-run would skip jobs - checking for existing successful runs');

            try {
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                per_page: 100,
              });

              const previewJobs = ['check-draft', 'preview', 'cleanup', 'fork-notice'];
              const successfulOtherRuns = checkRuns.check_runs.filter(cr => {
                const isOurJob = previewJobs.includes(cr.name);
                const isSuccessful = cr.conclusion === 'success';
                const fromDifferentRun = cr.html_url && !cr.html_url.includes(`/runs/${context.runId}/`);
                return isOurJob && isSuccessful && fromDifferentRun;
              });

              if (successfulOtherRuns.length > 0) {
                core.info(`Found ${successfulOtherRuns.length} successful runs - aborting to preserve status`);
                core.setOutput('should-run', 'false');
                return;
              }
            } catch (error) {
              core.warning(`Could not check existing runs: ${error.message}`);
            }

            core.info('No existing successful runs - proceeding');
            core.setOutput('should-run', 'true');

  # Notify fork PRs that preview is not available
  fork-notice:
    needs: check-draft
    if: |
      needs.check-draft.outputs.should-run == 'true' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Post fork notice comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const marker = '<!-- pr-preview-fork-notice -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (!existing) {
              const timestamp = new Date().toISOString().replace('T', ' ').split('.')[0] + ' UTC';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `${marker}\n## 📦 PR Preview — Preview Bot\n\n| Status | Details |\n|--------|----------|\n| **Result** | ⏭️ NOT AVAILABLE |\n| **Reason** | Fork PR (no write access to staging) |\n| **Checked** | ${timestamp} |\n\n### Local Preview\n\nPR previews are not available for pull requests from forks, since the deploy needs write access to the staging bucket.\n\nTo preview your changes locally, run:\n\`\`\`bash\nnpx hugo server\n\`\`\`\n\nOnce merged, your changes will be visible on the production site.`
              });
            }

  # Build and deploy preview
  preview:
    needs: check-draft
    # Skip fork PRs - forks can't assume the AWS OIDC role
    if: |
      needs.check-draft.outputs.should-run == 'true' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required for AWS OIDC
    env:
      PREVIEW_BASE_URL: https://test2.docs.influxdata.com/pr-preview/pr-${{ github.event.number }}/
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup docs environment
        uses: ./.github/actions/setup-docs-env

      - name: Fetch current PR body
        id: fetch-pr-body
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const fs = require('fs');
            const bodyFile = `${process.env.RUNNER_TEMP}/pr-body.txt`;
            fs.writeFileSync(bodyFile, pr.body || '');
            core.exportVariable('PR_BODY_FILE', bodyFile);

      - name: Detect changed pages (for comment links)
        id: detect
        continue-on-error: true # best-effort; never blocks the full-site deploy
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node .github/scripts/detect-preview-pages.js

      - name: Start build timer
        id: timer-start
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build docs site
        # API reference pages under content/{product}/api/ are gitignored
        # and generated at build time from OpenAPI specs. Without this
        # step, Hugo builds a site with no API pages and preview URLs for
        # any /api/ route 404 (see #7123 for the symptom).
        # Uses the canonical build-docs-site action for PR/prod parity.
        # hugo-environment: production (not pr-preview) so the preview
        # faithfully represents what production will serve: fingerprinted
        # + SRI JS, minification, real GA/GTM, and the __tests__/test_only
        # exclusions production applies. CI checks that need those fixtures
        # (Cypress, render checks) build their own copy in their own job
        # with the testing/development environment and never consume this
        # deployed preview.
        uses: ./.github/actions/build-docs-site
        with:
          hugo-environment: production
          hugo-gc: 'true'
          hugo-log-level: info
          hugo-base-url: ${{ env.PREVIEW_BASE_URL }}

      - name: Record build time
        id: build
        run: |
          DURATION=$(( $(date +%s) - ${{ steps.timer-start.outputs.ts }} ))
          echo "build-time=${DURATION}s" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PR_PREVIEW_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install s3deploy
        env:
          S3DEPLOY_VERSION: '2.11.0'
          S3DEPLOY_VERSION_HASH: 'd3566a6a56735ea5710cf22c35f8f411164e6efc22ded98743a1d7a5a21c740e'
        run: |
          mkdir -p "$HOME/bin"
          ./deploy/ci-install-s3deploy.sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Deploy full site to S3 preview prefix
        run: |
          s3deploy -source=public/ \
            -bucket="${{ secrets.STAGING_BUCKET }}" \
            -region="${{ vars.AWS_REGION }}" \
            -path "pr-preview/pr-${{ github.event.number }}" \
            -max-delete 50000 \
            -v
        # No -force: incremental sync compares against the prior deploy of
        # this same prefix, so repeated pushes only upload the diff.
        # No -distribution-id: invalidation is a separate explicit step
        # below (avoids depending on s3deploy's path-normalization and the
        # extra cloudfront:GetDistribution permission it would need).
        # .s3deploy.yml route config gives production cache/gzip header
        # parity on every deployed object.

      - name: Invalidate CloudFront preview prefix
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.STAGING_CF_DISTRIBUTION_ID }}" \
            --paths "/pr-preview/pr-${{ github.event.number }}/*"
        # Mandatory, not just cache hygiene: the staging distribution's
        # DefaultTTL is 30 days, and a 404 for a not-yet-deployed path can
        # be cached for several minutes, so without this the first visit
        # after each push can serve stale or missing content.

      - name: Post success comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { upsertPreviewComment } = await import('${{ github.workspace }}/.github/scripts/preview-comment.js');
            let pages = [];
            try {
              pages = JSON.parse('${{ steps.detect.outputs.changed-pages }}');
            } catch {}
            await upsertPreviewComment(github, context, {
              status: 'success',
              previewUrl: process.env.PREVIEW_BASE_URL,
              pages,
              buildTime: '${{ steps.build.outputs.build-time }}',
              prNumber: context.issue.number
            });

  # Cleanup on PR close
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required for AWS OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_PR_PREVIEW_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete preview from S3
        run: |
          aws s3 rm "s3://${{ secrets.STAGING_BUCKET }}/pr-preview/pr-${{ github.event.number }}/" --recursive
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.STAGING_CF_DISTRIBUTION_ID }}" \
            --paths "/pr-preview/pr-${{ github.event.number }}/*"

      - name: Delete preview comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { deletePreviewComment } = await import('${{ github.workspace }}/.github/scripts/preview-comment.js');
            await deletePreviewComment(github, context);
