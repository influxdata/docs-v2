name: Doc Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'assets/**'
      - 'data/**'

permissions: {}

concurrency:
  group: doc-review-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # Job 1: Resolve preview URLs from changed content files
  # -----------------------------------------------------------------
  resolve-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    outputs:
      urls: ${{ steps.detect.outputs.urls }}
      url-count: ${{ steps.detect.outputs.url-count }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          sparse-checkout: |
            content
            data/products.yml
            scripts/lib/content-utils.js
            .github/scripts/resolve-review-urls.js
            package.json
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install js-yaml gray-matter glob

      - name: Detect changed pages
        id: detect
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: node .github/scripts/resolve-review-urls.js

  # -----------------------------------------------------------------
  # Job 2: Claude diff-only review (runs in parallel with Job 1)
  # -----------------------------------------------------------------
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Load review prompt
        id: prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          PROMPT=$(cat .github/prompts/doc-review.md)
          PROMPT="${PROMPT//\$PR_NUMBER/$PR_NUMBER}"
          PROMPT="${PROMPT//\$REPOSITORY/$REPOSITORY}"
          {
            echo "content<<PROMPT_EOF"
            echo "$PROMPT"
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: >-
            --max-turns 10
            --allowedTools "Bash(gh pr diff),Bash(gh pr comment),Bash(gh pr edit),Read,Grep,Glob"

      - name: Fallback on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- doc-review-fallback -->';

            // Post fallback comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                marker,
                '## Doc Review',
                '',
                'Automated diff review encountered an error and could not complete.',
                'A human reviewer should check this PR manually.',
                '',
                `Run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
            });

            // Apply needs-human label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'review:approved',
              });
            } catch { /* label may not exist */ }

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'review:changes-requested',
              });
            } catch { /* label may not exist */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['review:needs-human'],
            });

  # -----------------------------------------------------------------
  # Job 3: Copilot visual review (depends on Job 1 for URLs)
  # -----------------------------------------------------------------
  copilot-visual-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    needs: resolve-urls
    if: needs.resolve-urls.outputs.url-count > 0
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          sparse-checkout: .github/prompts/copilot-visual-review.md
          sparse-checkout-cone-mode: false

      - name: Wait for preview deployment
        id: wait
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PREVIEW_URL="https://influxdata.github.io/docs-v2/pr-preview/pr-${PR_NUMBER}/"
          TIMEOUT=600  # 10 minutes
          INTERVAL=15
          ELAPSED=0

          echo "Waiting for preview at ${PREVIEW_URL}"

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --head "$PREVIEW_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Preview is live"
              echo "available=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Status: ${STATUS} (${ELAPSED}s / ${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Preview deployment timed out after ${TIMEOUT}s"
          echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Post visual review request
        if: steps.wait.outputs.available == 'true'
        uses: actions/github-script@v7
        env:
          PREVIEW_URLS: ${{ needs.resolve-urls.outputs.urls }}
        with:
          script: |
            const fs = require('fs');
            const urls = JSON.parse(process.env.PREVIEW_URLS);
            const prNumber = context.issue.number;
            const previewBase = `https://influxdata.github.io/docs-v2/pr-preview/pr-${prNumber}`;

            // Build preview URL list
            const urlList = urls
              .map(u => `- [${u}](${previewBase}${u})`)
              .join('\n');

            // Read the Copilot visual review template
            const template = fs.readFileSync(
              '.github/prompts/copilot-visual-review.md',
              'utf8'
            );

            const marker = '<!-- doc-review-visual -->';

            // Post preview URLs comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                marker,
                '## Preview Pages for Review',
                '',
                `${urls.length} page(s) changed in this PR:`,
                '',
                '<details>',
                '<summary>Preview URLs</summary>',
                '',
                urlList,
                '',
                '</details>',
              ].join('\n'),
            });

            // Post @copilot review comment with the template + URLs
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                `@copilot`,
                '',
                template.trim(),
                '',
                urlList,
              ].join('\n'),
            });

            core.info(`Posted visual review request with ${urls.length} URLs`);

      - name: Post timeout notice
        if: steps.wait.outputs.available == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- doc-review-visual-timeout -->';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                marker,
                '## Visual Review Skipped',
                '',
                'The PR preview deployment did not become available within 10 minutes.',
                'Visual review was skipped. The Claude diff review (Job 2) still ran.',
                '',
                'To trigger visual review manually, re-run this workflow after the',
                'preview is deployed.',
              ].join('\n'),
            });
