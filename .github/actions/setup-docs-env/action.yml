name: 'Setup Documentation Environment'
description: 'Sets up Node.js environment and installs dependencies for documentation workflows'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version-file: .nvmrc
        cache: 'yarn'

    - name: Verify Node version matches .nvmrc
      run: |
        NVMRC_MAJOR=$(tr -d 'v' < .nvmrc | cut -d'.' -f1)
        CURRENT_MAJOR=$(node --version | tr -d 'v' | cut -d'.' -f1)
        if [ "$CURRENT_MAJOR" != "$NVMRC_MAJOR" ]; then
          echo "Node major mismatch: running Node $CURRENT_MAJOR but .nvmrc requires $NVMRC_MAJOR"
          exit 1
        fi
        echo "Node $CURRENT_MAJOR matches .nvmrc requirement"
      shell: bash

    - name: Install dependencies
      run: yarn install --frozen-lockfile --non-interactive --prefer-offline
      shell: bash
    
    - name: Verify Hugo installation
      run: |
        echo "Checking Hugo availability..."
        if command -v hugo &> /dev/null; then
          echo "✅ Hugo found on PATH: $(which hugo)"
          hugo version
        else
          echo "⚠️ Hugo not found on PATH, will use project-local Hugo via yarn"
        fi
        
        echo "Checking yarn hugo command..."
        yarn hugo version || echo "⚠️ Project Hugo not available via yarn"
      shell: bash